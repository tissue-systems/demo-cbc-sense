; Wemos D1 Mini (ESP8266) + DHT22 → tissue Sense
;
; Full onboarding + reporting firmware: captive-portal Wi-Fi setup → account
; link (via the device's QR-code setup page) → temperature/humidity published
; over MQTT/TLS. User walkthrough: ONBOARDING.md; build/flash: README.md.
;
;   build/upload:  make upload   (or: pio run -t upload)
;   serial log:    make monitor  (or: pio device monitor)

[env:d1_mini]
platform  = espressif8266
board     = d1_mini
framework = arduino

; The code stores /creds.json on LittleFS; without this PIO builds a SPIFFS
; image for uploadfs and the firmware auto-formats it away at boot.
board_build.filesystem = littlefs

monitor_speed = 115200
; CH340 boards + some USB cables/hubs corrupt the flash stream at 921600
; ("Invalid head of packet"). 460800 is a reliable sweet spot; drop to
; 115200 if uploads still fail intermittently.
upload_speed  = 460800

lib_deps =
    tzapu/WiFiManager@^2.0.17            ; captive-portal Wi-Fi setup
    adafruit/DHT sensor library@^1.4.6   ; DHT22 reads
    adafruit/Adafruit Unified Sensor@^1.1.14
    knolleary/PubSubClient@^2.8          ; MQTT client
    bblanchon/ArduinoJson@^7.2.1         ; JSON payloads + stored credentials

build_flags =
    -D MQTT_MAX_PACKET_SIZE=512
    ; Bring-up default: TLS is encrypted but the server certificate is not
    ; validated (no CA pinned). Fine to get going. To validate the server,
    ; drop this flag and provide include/certs.h — see README.
    -D DEVICE_TLS_INSECURE=1
